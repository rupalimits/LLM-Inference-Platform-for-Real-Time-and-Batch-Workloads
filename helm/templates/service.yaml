apiVersion: v1
kind: Service
metadata:
  name: inference-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: inference
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.inference.port }}
    - name: metrics
      port: {{ .Values.inference.metricsPort }}
      targetPort: {{ .Values.inference.metricsPort }}
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: worker-metrics-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: worker
  ports:
    - name: metrics
      port: {{ .Values.worker.metricsPort }}
      targetPort: {{ .Values.worker.metricsPort }}
---
{{- if .Values.inference.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inference-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inference
  minReplicas: {{ .Values.inference.hpa.minReplicas }}
  maxReplicas: {{ .Values.inference.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.inference.hpa.cpuUtilization }}
{{- end }}
