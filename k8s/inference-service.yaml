apiVersion: v1
kind: Service
metadata:
  name: inference-service
  namespace: llm-platform
  labels:
    app: inference
spec:
  selector:
    app: inference
  ports:
    - name: http
      port: 80
      targetPort: 8000
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
# Optional: expose externally via LoadBalancer (cloud) or NodePort (local)
apiVersion: v1
kind: Service
metadata:
  name: inference-service-lb
  namespace: llm-platform
spec:
  selector:
    app: inference
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inference-hpa
  namespace: llm-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inference
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
